name: Pytest Coverage

on:
  push:
    - branches: [master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Build pyKVFinder
        run: pip install -e .[dev]

      - name: Run test coverage
        run: |
          pytest --cov=pyKVFinder --cov-report=term-missing | tee coverage.txt
          coverage report -m
          coverage xml

      - name: Coverage Badge
        run: |
          pip install -U genbadge[coverage]
          genbadge coverage -i  coverage.xml -o coverage.svg

      - name: Pytest coverage comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: coverage.txt
          default-branch: master
          remove-link-from-badge: true

      - name: Move report to coverage directory
        run: |
          mkdir coverage
          mv coverage.txt coverage.svg coverage/

      - name: Publish coverage report to coverage branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: coverage
          folder: coverage
          target-folder: .
          clean: true
          force: true
